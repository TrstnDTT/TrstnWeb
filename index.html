<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta

      content="Portfolio d’identités UI/UX par secteur — restaurants, boulangeries, salons, bars et studios."

    <link

      rel="stylesheet"
    />
    <title>TrstnWeb — Portfolio &amp; sites vitrines</title>
  </head>
  <body>
    <!-- Filtre SVG pour backdrop-filter: url(#noise) — grain papier / argentique -->
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="trstn-svg-defs" focusable="false">
      <defs>
        <filter
          id="noise"
          x="-20%"
          y="-20%"
          width="140%"
          height="140%"
          color-interpolation-filters="sRGB"
        >
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.82"
            numOctaves="3"
            stitchTiles="stitch"
            result="turb"
          />
          <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.15" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
